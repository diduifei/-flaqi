version: '3.8'

services:
  flvx-server:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    container_name: flvx-server
    restart: always
    network_mode: host
    environment:
      SERVER_ADDR: :6365
      DB_TYPE: sqlite
      DB_PATH: /app/data/gost.db
      JWT_SECRET: ${JWT_SECRET:-wangqi_flvx_666_@!}
      TZ: Asia/Shanghai
      PANEL_DEPLOY_DIR: /root/flvx
      PANEL_BACKEND_CONTAINER: flvx-server
    volumes:
      - ./go-backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/root/flvx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flvx-frontend:
    image: nginx:alpine
    container_name: flvx-frontend
    restart: always
    network_mode: host
    volumes:
      - ./vite-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flvx-server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
