services:
  flvx-server:
    image: diduifei/flvx-panel:latest
    container_name: flvx-server
    restart: always
    ports:
      - "${BACKEND_PORT:-6365}:6365"
    environment:
      SERVER_ADDR: ":6365"
      DB_PATH: "/app/data/gost.db"
      JWT_SECRET: "${JWT_SECRET:-change-me-before-production}"
      TZ: "Asia/Shanghai"
      PANEL_DEPLOY_DIR: "/root/flvx"
      PANEL_BACKEND_CONTAINER: "flvx-server"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flvx-frontend:
    image: diduifei/flvx-frontend:latest
    container_name: flvx-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - flvx-server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
