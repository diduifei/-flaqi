name: Build Docker Images and Agent Releases

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

env:
  DOCKERHUB_NAMESPACE: diduigege
  PANEL_IMAGE: flvx-panel
  FRONTEND_IMAGE: flvx-frontend

jobs:
  docker-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for panel
        id: panel_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.PANEL_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Docker metadata for frontend
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push panel image
        uses: docker/build-push-action@v6
        with:
          context: ./go-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.panel_meta.outputs.tags }}
          labels: ${{ steps.panel_meta.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

  agent-binaries:
    name: Build agent binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go-gost/go.sum

      - name: Build flvx-agent
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../dist/flvx-agent-linux-${{ matrix.arch }} .

      - name: Generate checksum
        working-directory: ./dist
        run: sha256sum flvx-agent-linux-${{ matrix.arch }} > flvx-agent-linux-${{ matrix.arch }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: flvx-agent-linux-${{ matrix.arch }}
          path: |
            dist/flvx-agent-linux-${{ matrix.arch }}
            dist/flvx-agent-linux-${{ matrix.arch }}.sha256

  backend-binaries:
    name: Build backend binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go-backend/go.sum

      - name: Build paneld
        working-directory: ./go-backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" \
            -o ../dist/flvx-panel-linux-${{ matrix.arch }} ./cmd/paneld

      - name: Generate checksum
        working-directory: ./dist
        run: sha256sum flvx-panel-linux-${{ matrix.arch }} > flvx-panel-linux-${{ matrix.arch }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: flvx-panel-linux-${{ matrix.arch }}
          path: |
            dist/flvx-panel-linux-${{ matrix.arch }}
            dist/flvx-panel-linux-${{ matrix.arch }}.sha256

  publish-main-agent:
    name: Publish rolling main release
    if: github.ref == 'refs/heads/main'
    needs:
      - docker-images
      - agent-binaries
      - backend-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flvx-agent-linux-*
          path: dist
          merge-multiple: true

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flvx-panel-linux-*
          path: dist
          merge-multiple: true

      - name: Publish latest-agent release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest-agent "${GITHUB_SHA}"
          git push -f origin latest-agent
          gh release delete latest-agent --yes || true
          gh release create latest-agent dist/* \
            --title "Latest FLVX Main Build" \
            --notes "Rolling panel and agent binaries built from main commit ${GITHUB_SHA}." \
            --prerelease

  publish-tag-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - docker-images
      - agent-binaries
      - backend-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flvx-agent-linux-*
          path: dist
          merge-multiple: true

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flvx-panel-linux-*
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
